<svg xmlns="http://www.w3.org/2000/svg" version="1.2" baseProfile="tiny-ps" viewBox="0 0 100 100">
  <title>Jarvis</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0f1628"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e08a30"/>
      <stop offset="0.5" stop-color="#f0a040"/>
      <stop offset="1" stop-color="#4488dd"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3366bb"/>
      <stop offset="1" stop-color="#2244aa"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ddddee"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.9"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#inner)" stroke-width="1.5" opacity="0.6"/>
  <!-- Tick marks -->
  <line x1="50" y1="6" x2="50" y2="12" stroke="#f0a040" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="88" x2="50" y2="94" stroke="#f0a040" stroke-width="1.5" opacity="0.7"/>
  <line x1="6" y1="50" x2="12" y2="50" stroke="#4488dd" stroke-width="1.5" opacity="0.7"/>
  <line x1="88" y1="50" x2="94" y2="50" stroke="#4488dd" stroke-width="1.5" opacity="0.7"/>
  <!-- Corner accents -->
  <line x1="17" y1="17" x2="22" y2="22" stroke="#e08a30" stroke-width="1" opacity="0.5"/>
  <line x1="83" y1="17" x2="78" y2="22" stroke="#e08a30" stroke-width="1" opacity="0.5"/>
  <line x1="17" y1="83" x2="22" y2="78" stroke="#4488dd" stroke-width="1" opacity="0.5"/>
  <line x1="83" y1="83" x2="78" y2="78" stroke="#4488dd" stroke-width="1" opacity="0.5"/>
  <!-- AGIS text -->
  <text x="50" y="55" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="22" fill="url(#txt)" letter-spacing="3">AGIS</text>
</svg>
