<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis - Portal</title>
  <meta name="description" content="Manage Jarvis for your Discord servers - features, moderators, automod, and more.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://cdn.discordapp.com" crossorigin>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text: #e9e9e9;
      --muted: #888;
      --accent: #5865f2;
      --danger: #ed4245;
      --success: #3ba55d;
      --warn: #faa61a;
    }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(88,101,242,0.12), transparent 60%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: #cfd4ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header.portal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .brand {
      display: flex; align-items: center; gap: 0.6rem;
      font-weight: 700; font-size: 1.1rem; color: #fff;
    }
    .brand svg { width: 24px; height: 24px; }
    .user-widget {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .user-widget img {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border-strong);
    }
    .user-name { font-weight: 500; }
    .user-handle { color: var(--muted); font-size: 0.85rem; }
    .logout-btn {
      margin-left: 0.75rem;
      padding: 0.35rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--danger); }

    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.75rem; margin: 0 0 0.25rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }

    .guild-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .guild-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      min-height: 186px;
    }
    .guild-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: 0 10px 22px rgba(0,0,0,0.2);
    }
    .guild-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88,101,242,0.3);
    }
    .guild-card-top {
      display: flex;
      gap: 0.85rem;
      align-items: flex-start;
      min-width: 0;
    }
    .guild-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--muted); flex-shrink: 0;
      overflow: hidden;
    }
    .guild-icon img { width: 100%; height: 100%; border-radius: inherit; object-fit: cover; display: block; }
    .guild-meta-text { min-width: 0; flex: 1; }
    .guild-name {
      font-weight: 700;
      font-size: 0.98rem;
      line-height: 1.2;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }
    .guild-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      background: var(--surface-2);
      border-radius: 999px;
      font-size: 0.7rem;
      margin-left: 0.35rem;
    }
    .badge.owner { background: rgba(250,166,26,0.2); color: var(--warn); }
    .badge.admin { background: rgba(88,101,242,0.18); color: #cfd4ff; }
    .badge.installed { background: rgba(59,165,93,0.18); color: #93e0ae; }
    .badge.invite { background: rgba(250,166,26,0.18); color: var(--warn); }
    .badge.bot-owner { background: rgba(237,66,69,0.18); color: #f4a3a5; }

    .portal-toolbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .toolbar-control {
      min-width: 180px;
      max-width: 240px;
      width: 100%;
    }
    .toolbar-label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
    }
    .guild-section {
      margin-bottom: 2rem;
    }
    .guild-section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .guild-section h2 {
      font-size: 1.05rem;
      margin: 0;
      color: #fff;
    }
    .section-copy {
      color: var(--muted);
      margin: 0.25rem 0 0;
      font-size: 0.85rem;
    }
    .section-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      height: 2rem;
      padding: 0 0.6rem;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .guild-card.inviteable {
      cursor: pointer;
    }
    .guild-note {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 0.2rem;
    }
    .guild-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.45rem;
    }
    .guild-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: auto;
      flex-wrap: wrap;
    }
    .card-action-hint {
      color: var(--muted);
      font-size: 0.78rem;
    }
    .card-action-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.74rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Dashboard Overlay */
    .dashboard-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .dashboard-modal {
      width: min(800px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: #111;
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }
    .dashboard-modal::-webkit-scrollbar { width: 8px; }
    .dashboard-modal::-webkit-scrollbar-track { background: transparent; }
    .dashboard-modal::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    .dashboard-modal::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    
    .dashboard-modal h2 {
      font-size: 1.25rem;
      margin: 0 0 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .close-dashboard {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .close-dashboard:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(237, 66, 69, 0.1);
    }

    .section { margin-bottom: 2.5rem; }
    .section h3 { font-size: 1rem; margin: 0 0 0.9rem; color: #fff; }
    .section p.hint { color: var(--muted); font-size: 0.85rem; margin: 0 0 0.9rem; }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .feature-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .feature-toggle label { text-transform: capitalize; cursor: pointer; }

    .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #333; border-radius: 24px; transition: 0.2s;
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    select, input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #111111;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
    }
    select option {
      background: #111111;
      color: var(--text);
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      margin: 0.15rem 0.3rem 0.15rem 0;
      font-size: 0.85rem;
    }
    .chip button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0;
    }
    .chip button:hover { color: var(--danger); }

    .btn {
      padding: 0.55rem 1.1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      color: var(--text);
    }

    .save-bar {
      position: sticky;
      bottom: -1rem; /* stick to bottom of scroll container */
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(10,10,10,0.95);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
      z-index: 20;
    }
    .save-bar.hidden { display: none; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 50;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      width: min(560px, 100%);
      background: #111;
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-title-row {
      display: flex;
      gap: 0.85rem;
      align-items: center;
      min-width: 0;
    }
    .modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface-2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--muted);
    }
    .modal-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-title { font-size: 1.05rem; font-weight: 700; line-height: 1.2; word-break: break-word; }
    .modal-subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 0.15rem; }
    .modal-body { padding: 1.2rem; }
    .modal-body p { margin: 0 0 0.9rem; color: var(--muted); }
    .modal-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.75rem 0 1rem; }
    .modal-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
    .modal-close {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { border-color: var(--accent); }

    .status-msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .status-msg.info { background: rgba(88,101,242,0.15); color: #cfd4ff; }
    .status-msg.success { background: rgba(59,165,93,0.15); color: #93e0ae; }
    .status-msg.error { background: rgba(237,66,69,0.15); color: #f4a3a5; }

    .loading { color: var(--muted); padding: 2rem; text-align: center; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      background: var(--surface);
    }
    .empty-state p { color: var(--muted); margin: 0.5rem 0; }

    .login-hero {
      max-width: 560px; margin: 4rem auto; text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
    }
    .login-hero h1 { font-size: 2.2rem; margin: 0 0 0.75rem; }
    .login-hero p { color: var(--muted); margin: 0 0 2rem; }
    .discord-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--accent);
      color: #fff;
      padding: 0.9rem 1.75rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
    }
    .discord-btn:hover { opacity: 0.9; text-decoration: none; }

    @media (max-width: 640px) {
      .guild-card { min-height: 0; }
      .modal { width: 100%; }
      .modal-head { padding: 1rem; }
      .modal-body { padding: 1rem; }
      .modal-actions { justify-content: stretch; }
      .modal-actions .btn, .modal-actions .btn-secondary, .modal-actions a { width: 100%; }
      .guild-name { font-size: 0.94rem; }
      .guild-actions { align-items: flex-start; }
      .card-action-chip { font-size: 0.7rem; }
      header.portal-header { padding: 1rem; }
      main { padding: 1.25rem; }
      
      .dashboard-modal-overlay { padding: 0; }
      .dashboard-modal { 
        width: 100%; 
        height: 100%; 
        max-height: 100vh; 
        border-radius: 0; 
        padding: 1.25rem;
      }
      .dashboard-modal h2 { font-size: 1.1rem; }
      
      .user-name { display: none; }
    }
  </style>
</head>
<body>
<header class="portal-header">
  <a href="/" class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/>
    </svg>
    Jarvis Portal
  </a>
  <div id="user-widget" class="user-widget"></div>
</header>

<main>
  <div id="app">
    <div class="loading">Loading…</div>
  </div>
</main>

<div id="guild-modal-root"></div>
<div id="dashboard-modal-root"></div>

<script>
  const OAUTH_CONFIGURED = %%OAUTH_CONFIGURED%%;
  const BASE_URL = "%%SITE_BASE_URL%%";
  const BOT_INVITE_URL = "%%BOT_INVITE%%";

  const state = {
    user: null,
    manageableGuilds: [],
    inviteableGuilds: [],
    guildsLoaded: false,
    currentGuildId: null,
    currentConfig: null,
    pendingPatch: {},
    sortMode: 'member_count',
    isBotOwner: false,
    modalGuild: null,
  };

  const el = (id) => document.getElementById(id);

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function guildInitial(guild) {
    return String(guild?.name || '?').charAt(0).toUpperCase();
  }

  function renderGuildIcon(guild) {
    const urls = [guild?.icon, ...((Array.isArray(guild?.iconFallbacks) ? guild.iconFallbacks : []))]
      .filter(Boolean);
    const initial = guildInitial(guild);
    if (!urls.length) {
      return escapeHtml(initial);
    }
    return `<img src="${escapeHtml(urls[0])}" alt="" loading="lazy" decoding="async" data-fallbacks="${escapeHtml(JSON.stringify(urls.slice(1)))}" data-initial="${escapeHtml(initial)}" onerror="handleGuildIconError(this)">`;
  }

  function handleGuildIconError(img) {
    let fallbacks = [];
    try {
      fallbacks = JSON.parse(img.dataset.fallbacks || '[]');
    } catch {
      fallbacks = [];
    }

    const nextUrl = fallbacks.shift();
    if (nextUrl) {
      img.dataset.fallbacks = JSON.stringify(fallbacks);
      img.src = nextUrl;
      return;
    }

    const parent = img.parentElement;
    if (parent) {
      parent.textContent = img.dataset.initial || '?';
    }
  }

  function getGuildById(guildId) {
    return [...(state.manageableGuilds || []), ...(state.inviteableGuilds || [])]
      .find((g) => String(g.id) === String(guildId)) || null;
  }

  function sortGuilds(list, mode = 'member_count') {
    const items = Array.isArray(list) ? list.slice() : [];
    const nameSort = (a, b) => String(a.name || '').localeCompare(String(b.name || ''), undefined, { sensitivity: 'base' });
    items.sort((a, b) => {
      if (mode === 'activity') {
        const activityDiff = (Number(b.activityCount || 0) - Number(a.activityCount || 0));
        if (activityDiff) { return activityDiff; }
        const memberDiff = (Number(b.memberCount || 0) - Number(a.memberCount || 0));
        if (memberDiff) { return memberDiff; }
        return nameSort(a, b);
      }
      const memberDiff = (Number(b.memberCount || 0) - Number(a.memberCount || 0));
      if (memberDiff) { return memberDiff; }
      const activityDiff = (Number(b.activityCount || 0) - Number(a.activityCount || 0));
      if (activityDiff) { return activityDiff; }
      return nameSort(a, b);
    });
    return items;
  }

  function renderGuildCard(g, { inviteable = false } = {}) {
    const icon = renderGuildIcon(g);
    const memberCount = Number(g.memberCount || 0).toLocaleString();
    const activityCount = Number(g.activityCount || 0).toLocaleString();
    const subtitleBits = [`${memberCount} members`];
    if (Number(g.activityCount || 0) > 0) {
      subtitleBits.push(`${activityCount} active`);
    }
    const subtitle = subtitleBits.join(' • ');
    const badges = [
      g.installed ? '<span class="badge installed">Installed</span>' : '<span class="badge invite">Not installed</span>',
      g.youAreOwner ? '<span class="badge owner">Owner</span>' : '',
      (!g.youAreOwner && g.youAreAdmin) ? '<span class="badge admin">Admin</span>' : '',
      (state.isBotOwner && g.installed) ? '<span class="badge bot-owner">Bot owner</span>' : '',
      g.botHasAdmin ? '<span class="badge">Bot admin</span>' : (!inviteable && g.installed ? '<span class="badge">No Admin</span>' : ''),
    ].filter(Boolean).join('');
    const actionHint = inviteable ? 'Open invite details' : 'Open server controls';
    const actionChip = inviteable ? 'Invite available' : 'Manage server';
    return `
      <div class="guild-card ${state.currentGuildId === g.id ? 'active' : ''} ${inviteable ? 'inviteable' : ''}"
           data-guild-id="${escapeHtml(g.id)}"
           data-inviteable="${inviteable ? '1' : '0'}">
        <div class="guild-card-top">
          <div class="guild-icon">${icon}</div>
          <div class="guild-meta-text">
            <div class="guild-name">${escapeHtml(g.name)}</div>
            <div class="guild-meta">${subtitle}</div>
            ${g.installed ? '' : '<div class="guild-note">Jarvis is not installed here yet.</div>'}
            <div class="guild-badges">${badges}</div>
          </div>
        </div>
        <div class="guild-actions">
          <span class="card-action-hint">${escapeHtml(actionHint)}</span>
          <span class="card-action-chip">${escapeHtml(actionChip)}</span>
        </div>
      </div>
    `;
  }

  function renderGuildSection(title, subtitle, guilds, inviteable = false) {
    return `
      <section class="guild-section">
        <div class="guild-section-head">
          <div>
            <h2>${escapeHtml(title)}</h2>
            <p class="section-copy">${escapeHtml(subtitle)}</p>
          </div>
          <div class="section-pill">${guilds.length}</div>
        </div>
        <div class="guild-grid">
          ${guilds.map((g) => renderGuildCard(g, { inviteable })).join('')}
        </div>
      </section>
    `;
  }

  function renderGuildModal() {
    const root = el('guild-modal-root');
    if (!root) { return; }
    const modal = state.modalGuild;
    if (!modal) {
      root.innerHTML = '';
      return;
    }
    const icon = renderGuildIcon(modal);
    const memberCount = Number(modal.memberCount || 0).toLocaleString();
    const activityCount = Number(modal.activityCount || 0).toLocaleString();
    const inviteUrl = escapeHtml(modal.inviteUrl || BOT_INVITE_URL || '%%DISCORD_INVITE%%' || '#');
    const canInvite = Boolean(modal.canInvite);
    const badgeHtml = [
      modal.installed ? '<span class="badge installed">Installed</span>' : '<span class="badge invite">Not installed</span>',
      modal.youAreOwner ? '<span class="badge owner">Owner</span>' : '',
      (!modal.youAreOwner && modal.youAreAdmin) ? '<span class="badge admin">Admin</span>' : '',
      (state.isBotOwner && modal.installed) ? '<span class="badge bot-owner">Bot owner</span>' : '',
      modal.botHasAdmin ? '<span class="badge">Bot admin</span>' : (!modal.installed ? '<span class="badge">No Admin</span>' : ''),
    ].filter(Boolean).join('');
    const primaryAction = modal.installed
      ? `<button class="btn" id="modal-open-config-btn" type="button">Open config</button>`
      : canInvite
        ? `<a class="btn" href="${inviteUrl}" target="_blank" rel="noopener noreferrer">Invite Jarvis</a>`
        : `<span class="btn" style="opacity:0.5;pointer-events:none;">Invite unavailable</span>`;
    const secondaryAction = modal.installed
      ? `<a class="btn-secondary btn" href="#" id="modal-close-and-open">Open and close</a>`
      : `<button class="btn-secondary btn" id="modal-close-btn-2" type="button">Close</button>`;
    root.innerHTML = `
      <div class="modal-overlay" id="guild-modal-overlay" role="presentation">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="guild-modal-title">
          <div class="modal-head">
            <div class="modal-title-row">
              <div class="modal-icon">${icon}</div>
              <div style="min-width:0;">
                <div class="modal-title" id="guild-modal-title">${escapeHtml(modal.name)}</div>
                <div class="modal-subtitle">${escapeHtml(memberCount)} members${Number(modal.activityCount || 0) > 0 ? ` • ${escapeHtml(activityCount)} active` : ''}</div>
              </div>
            </div>
            <button class="modal-close" id="modal-close-btn" type="button" aria-label="Close">×</button>
          </div>
          <div class="modal-body">
            <p>${modal.installed
              ? 'Jarvis is already installed here. Open the config without hunting through the page.'
              : 'Jarvis is not installed here yet. Use the invite action only when you actually have owner or admin access.'}</p>
            <div class="modal-badges">${badgeHtml}</div>
            <div class="modal-actions">
              ${secondaryAction}
              ${primaryAction}
            </div>
          </div>
        </div>
      </div>
    `;
    const overlay = el('guild-modal-overlay');
    overlay?.addEventListener('click', (e) => {
      if (e.target === overlay) {
        closeGuildModal();
      }
    });
    el('modal-close-btn')?.addEventListener('click', closeGuildModal);
    el('modal-close-btn-2')?.addEventListener('click', closeGuildModal);
    el('modal-open-config-btn')?.addEventListener('click', async () => {
      const gid = modal.id;
      closeGuildModal();
      await selectGuild(gid);
    });
    el('modal-close-and-open')?.addEventListener('click', async (e) => {
      e.preventDefault();
      const gid = modal.id;
      closeGuildModal();
      await selectGuild(gid);
    });
  }

  function openGuildModal(guildId) {
    const guild = getGuildById(guildId);
    if (!guild) { return; }
    state.modalGuild = guild;
    renderApp();
  }

  function closeGuildModal() {
    if (!state.modalGuild) { return; }
    state.modalGuild = null;
    renderApp();
  }

  function closeDashboard() {
    if (Object.keys(state.pendingPatch || {}).length > 0) {
      if (!confirm('You have unsaved changes. Are you sure you want to discard them and close?')) {
        return;
      }
    }
    state.currentGuildId = null;
    state.currentConfig = null;
    state.pendingPatch = {};
    renderApp();
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (!res.ok) {
      let payload = {};
      try { payload = await res.json(); } catch {}
      throw new Error(payload.error || `Request failed: ${res.status}`);
    }
    return res.json();
  }

  function renderLogin() {
    const message = OAUTH_CONFIGURED
      ? "Sign in with Discord to manage Jarvis in servers where you're a moderator."
      : "Discord OAuth is not configured on this deployment. Contact the administrator.";
    el('app').innerHTML = `
      <div class="login-hero">
        <h1>Jarvis Portal</h1>
        <p>${escapeHtml(message)}</p>
        ${OAUTH_CONFIGURED ? `
          <a href="/portal/login" class="discord-btn">
            <svg width="22" height="17" viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.55 58.55 0 0 0 45.5.4a.22.22 0 0 0-.23.11c-.63 1.12-1.33 2.58-1.82 3.72a54 54 0 0 0-16.2 0A37.4 37.4 0 0 0 25.4.51.23.23 0 0 0 25.16.4 58.4 58.4 0 0 0 10.56 4.9a.2.2 0 0 0-.09.08C1.58 18.73-.92 32.14.3 45.38a.24.24 0 0 0 .09.17 58.84 58.84 0 0 0 17.72 8.97.23.23 0 0 0 .25-.08c1.37-1.87 2.59-3.84 3.63-5.92a.23.23 0 0 0-.12-.32 38.72 38.72 0 0 1-5.54-2.64.23.23 0 0 1-.02-.38c.37-.28.75-.57 1.1-.86a.22.22 0 0 1 .23-.03c11.62 5.3 24.2 5.3 35.69 0a.22.22 0 0 1 .23.03c.35.29.73.58 1.1.86a.23.23 0 0 1-.02.38 36.3 36.3 0 0 1-5.55 2.64.23.23 0 0 0-.12.32 44.44 44.44 0 0 0 3.63 5.92.23.23 0 0 0 .25.08 58.66 58.66 0 0 0 17.74-8.97.23.23 0 0 0 .09-.16c1.5-15.43-2.51-28.73-10.63-40.41a.18.18 0 0 0-.1-.08ZM23.72 37.33c-3.5 0-6.38-3.21-6.38-7.15 0-3.94 2.83-7.15 6.38-7.15 3.58 0 6.43 3.24 6.38 7.15 0 3.94-2.83 7.15-6.38 7.15Zm23.59 0c-3.5 0-6.38-3.21-6.38-7.15 0-3.94 2.83-7.15 6.38-7.15 3.58 0 6.43 3.24 6.38 7.15 0 3.94-2.8 7.15-6.38 7.15Z" fill="#fff"/></svg>
            Continue with Discord
          </a>
        ` : ''}
      </div>
    `;
  }

  function renderUserWidget() {
    if (!state.user) {
      el('user-widget').innerHTML = `<a href="/portal/login">Sign in</a>`;
      return;
    }
    const name = state.user.globalName || state.user.username;
    const ownerBadge = state.isBotOwner ? ' <span class="badge bot-owner">Bot owner</span>' : '';
    el('user-widget').innerHTML = `
      <img src="${escapeHtml(state.user.avatarUrl)}" alt="avatar" loading="lazy">
      <div>
        <div class="user-name">${escapeHtml(name)}${ownerBadge}</div>
        <div class="user-handle">@${escapeHtml(state.user.username)}</div>
      </div>
      <button class="logout-btn" id="logout-btn">Log out</button>
    `;
    el('logout-btn').addEventListener('click', async () => {
      await apiFetch('/portal/logout', { method: 'POST' }).catch(() => {});
      location.href = '/portal';
    });
  }

  function renderGuildList() {
    const managed = sortGuilds((state.manageableGuilds || []).filter((g) => g.installed), state.sortMode);
    const inviteable = sortGuilds((state.inviteableGuilds || []).filter((g) => g.canInvite !== false), state.sortMode);

    if (!state.guildsLoaded) {
      return `
        <div class="portal-toolbar">
          <div>
            <h1>Your servers</h1>
            <p class="subtitle">Looking up servers where you can manage Jarvis…</p>
          </div>
        </div>
        <div class="loading">Loading servers…</div>
      `;
    }

    if (!managed.length && !inviteable.length) {
      return `
        <div class="empty-state">
          <h2>No servers to show</h2>
          <p>${state.isBotOwner
            ? 'Jarvis is not in any servers yet, or your bot cache is still warming up.'
            : 'You need to own or administer a server where Jarvis is installed.'}</p>
          <p style="margin-top: 1rem;">
            <a href="${escapeHtml(BOT_INVITE_URL || '%%DISCORD_INVITE%%')}">Invite Jarvis</a>
            to a server you control.
          </p>
        </div>
      `;
    }

    return `
      <div class="portal-toolbar">
        <div>
          <h1>Your servers</h1>
          <p class="subtitle">${state.isBotOwner
            ? 'Owner mode: every guild Jarvis is in is visible here.'
            : 'Only servers you own or administer, where Jarvis is installed or can be invited, are shown here.'}</p>
        </div>
        <div class="toolbar-control">
          <label for="sort-select" class="toolbar-label">Sort by</label>
          <select id="sort-select">
            <option value="member_count" ${state.sortMode === 'member_count' ? 'selected' : ''}>Member count</option>
            <option value="activity" ${state.sortMode === 'activity' ? 'selected' : ''}>Activity</option>
          </select>
        </div>
      </div>
      ${managed.length ? renderGuildSection('Installed servers', 'Servers where Jarvis is already installed and you can manage it.', managed, false) : ''}
      ${inviteable.length ? renderGuildSection('Invite Jarvis', 'Servers you own or administer where Jarvis is not installed yet.', inviteable, true) : ''}
    `;
  }

  function renderDashboardOverlay() {
    if (!state.currentGuildId) return '';
    const guild = getGuildById(state.currentGuildId);
    const cfg = state.currentConfig;

    if (!cfg) {
      return `
        <div class="dashboard-modal-overlay" id="dash-overlay">
          <div class="dashboard-modal">
            <h2>
              <span style="display:flex; align-items:center; gap: 10px;">
                ⚙️ ${escapeHtml(guild?.name || 'Server')}
              </span>
              <button class="close-dashboard" id="close-dash-btn" aria-label="Close">×</button>
            </h2>
            <div id="status-area"></div>
            <div class="loading">Loading server config…</div>
          </div>
        </div>
      `;
    }

    const features = cfg.features || {};
    const channels = cfg.channels || [];
    const roles = cfg.roles || [];
    return `
      <div class="dashboard-modal-overlay" id="dash-overlay">
        <div class="dashboard-modal">
          <h2>
            <span style="display:flex; align-items:center; gap: 10px;">
              ⚙️ ${escapeHtml(guild?.name || 'Server')} - Configuration
            </span>
            <div style="display:flex; align-items:center; gap: 8px;">
              <button class="btn-secondary btn" id="reload-config-btn" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">↻ Reload</button>
              <button class="close-dashboard" id="close-dash-btn" aria-label="Close">×</button>
            </div>
          </h2>

          <div id="status-area"></div>

          <div class="section">
            <h3>Feature modules</h3>
            <p class="hint">Enable or disable Jarvis modules for this server. Changes apply immediately after saving.</p>
            <div class="feature-grid">
              ${Object.entries(features).map(([key, enabled]) => `
                <div class="feature-toggle">
                  <label for="feat-${escapeHtml(key)}">${escapeHtml(key)}</label>
                  <label class="switch">
                    <input type="checkbox" id="feat-${escapeHtml(key)}" data-feature="${escapeHtml(key)}" ${enabled ? 'checked' : ''}>
                    <span class="slider"></span>
                  </label>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="section">
            <h3>AI chat channel</h3>
            <p class="hint">Restrict Jarvis chat replies to one channel. Leave empty to allow in any channel Jarvis can see.</p>
            <select id="ai-channel-select">
              <option value="">No restriction</option>
              ${channels.map((c) => `
                <option value="${escapeHtml(c.id)}" ${cfg.aiChannelId === c.id ? 'selected' : ''}>#${escapeHtml(c.name)}</option>
              `).join('')}
            </select>
          </div>

          <div class="section">
            <h3>Moderator roles</h3>
            <p class="hint">Members with these roles can run moderation commands and edit server config.</p>
            <select id="moderator-role-select">
              <option value="">Add a role…</option>
              ${roles.map((r) => `
                <option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>
              `).join('')}
            </select>
            <div id="moderator-role-chips" style="margin-top: 0.6rem;">
              ${(cfg.moderatorRoleIds || []).map((id) => {
                const role = roles.find((r) => r.id === id);
                return `<span class="chip" data-role-id="${escapeHtml(id)}">${escapeHtml(role?.name || id)} <button type="button">×</button></span>`;
              }).join('')}
            </div>
          </div>

          <div class="section">
            <h3>AI role blacklist</h3>
            <p class="hint">Members with these roles cannot trigger Jarvis AI chat (mentions, replies, wake-words). Slash commands are not affected.</p>
            <select id="ai-role-blacklist-select">
              <option value="">Add a role…</option>
              ${roles.map((r) => `
                <option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>
              `).join('')}
            </select>
            <div id="ai-role-blacklist-chips" style="margin-top: 0.6rem;">
              ${(cfg.blockedAiRoleIds || []).map((id) => {
                const role = roles.find((r) => r.id === id);
                return `<span class="chip" data-blacklist-role-id="${escapeHtml(id)}">${escapeHtml(role?.name || id)} <button type="button">×</button></span>`;
              }).join('')}
            </div>
          </div>

          <div class="section">
            <h3>Wake word</h3>
            <p class="hint">Custom word that wakes Jarvis, or disable wake words entirely.</p>
            <input type="text" id="wake-word-input" placeholder="jarvis" value="${escapeHtml(cfg.customWakeWord || '')}" maxlength="32">
            <div class="feature-toggle" style="margin-top: 0.75rem;">
              <label for="wake-disabled-toggle">Disable wake words entirely</label>
              <label class="switch">
                <input type="checkbox" id="wake-disabled-toggle" ${cfg.wakeWordsDisabled ? 'checked' : ''}>
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="save-bar hidden" id="save-bar">
            <span id="save-bar-status">You have unsaved changes.</span>
            <div>
              <button class="btn-secondary btn" id="discard-btn">Discard</button>
              <button class="btn" id="save-btn">Save changes</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function wireDashboardEvents() {
    // Overlay close buttons
    el('close-dash-btn')?.addEventListener('click', closeDashboard);
    el('dash-overlay')?.addEventListener('click', (e) => {
      if (e.target.id === 'dash-overlay') {
        closeDashboard();
      }
    });

    if (!state.currentConfig) return; // Skip if config is still loading

    // Feature toggles
    document.querySelectorAll('[data-feature]').forEach((el) => {
      el.addEventListener('change', () => {
        state.pendingPatch.features = state.pendingPatch.features || {};
        state.pendingPatch.features[el.dataset.feature] = el.checked;
        toggleSaveBar();
      });
    });

    // AI channel
    el('ai-channel-select')?.addEventListener('change', (e) => {
      state.pendingPatch.aiChannelId = e.target.value || null;
      toggleSaveBar();
    });

    // Moderator role add
    el('moderator-role-select')?.addEventListener('change', (e) => {
      const roleId = e.target.value;
      if (!roleId) {return;}
      const current = (state.pendingPatch.moderatorRoleIds || state.currentConfig.moderatorRoleIds || []).slice();
      if (current.includes(roleId)) {
        e.target.value = '';
        return;
      }
      current.push(roleId);
      state.pendingPatch.moderatorRoleIds = current;
      rerenderModeratorChips();
      e.target.value = '';
      toggleSaveBar();
    });

    // Moderator role remove
    el('moderator-role-chips')?.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') {return;}
      const chip = e.target.closest('.chip');
      if (!chip) {return;}
      const roleId = chip.dataset.roleId;
      const current = (state.pendingPatch.moderatorRoleIds || state.currentConfig.moderatorRoleIds || []).slice();
      state.pendingPatch.moderatorRoleIds = current.filter((id) => id !== roleId);
      rerenderModeratorChips();
      toggleSaveBar();
    });

    // AI role blacklist add
    el('ai-role-blacklist-select')?.addEventListener('change', (e) => {
      const roleId = e.target.value;
      if (!roleId) {return;}
      const current = (state.pendingPatch.blockedAiRoleIds || state.currentConfig.blockedAiRoleIds || []).slice();
      if (current.includes(roleId)) {
        e.target.value = '';
        return;
      }
      current.push(roleId);
      state.pendingPatch.blockedAiRoleIds = current;
      rerenderBlacklistChips();
      e.target.value = '';
      toggleSaveBar();
    });

    // AI role blacklist remove
    el('ai-role-blacklist-chips')?.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') {return;}
      const chip = e.target.closest('.chip');
      if (!chip) {return;}
      const roleId = chip.dataset.blacklistRoleId;
      const current = (state.pendingPatch.blockedAiRoleIds || state.currentConfig.blockedAiRoleIds || []).slice();
      state.pendingPatch.blockedAiRoleIds = current.filter((id) => id !== roleId);
      rerenderBlacklistChips();
      toggleSaveBar();
    });

    // Wake word
    el('wake-word-input')?.addEventListener('input', (e) => {
      state.pendingPatch.customWakeWord = e.target.value.trim() || null;
      toggleSaveBar();
    });
    el('wake-disabled-toggle')?.addEventListener('change', (e) => {
      state.pendingPatch.wakeWordsDisabled = e.target.checked;
      toggleSaveBar();
    });

    // Save / discard
    el('save-btn')?.addEventListener('click', saveChanges);
    el('discard-btn')?.addEventListener('click', () => {
      state.pendingPatch = {};
      renderApp();
    });
    el('reload-config-btn')?.addEventListener('click', () => selectGuild(state.currentGuildId, true));
  }

  function rerenderBlacklistChips() {
    const container = el('ai-role-blacklist-chips');
    if (!container) {return;}
    const ids = state.pendingPatch.blockedAiRoleIds || state.currentConfig.blockedAiRoleIds || [];
    const roles = state.currentConfig.roles || [];
    container.innerHTML = ids.map((id) => {
      const role = roles.find((r) => r.id === id);
      return `<span class="chip" data-blacklist-role-id="${escapeHtml(id)}">${escapeHtml(role?.name || id)} <button type="button">×</button></span>`;
    }).join('');
  }

  function rerenderModeratorChips() {
    const container = el('moderator-role-chips');
    if (!container) {return;}
    const ids = state.pendingPatch.moderatorRoleIds || state.currentConfig.moderatorRoleIds || [];
    const roles = state.currentConfig.roles || [];
    container.innerHTML = ids.map((id) => {
      const role = roles.find((r) => r.id === id);
      return `<span class="chip" data-role-id="${escapeHtml(id)}">${escapeHtml(role?.name || id)} <button type="button">×</button></span>`;
    }).join('');
  }

  function toggleSaveBar() {
    const bar = el('save-bar');
    if (!bar) {return;}
    const hasPending = Object.keys(state.pendingPatch).length > 0;
    bar.classList.toggle('hidden', !hasPending);
  }

  function setStatus(message, kind = 'info') {
    const area = el('status-area');
    if (!area) {return;}
    area.innerHTML = `<div class="status-msg ${kind}">${escapeHtml(message)}</div>`;
    setTimeout(() => { if (area.innerHTML.includes(message)) area.innerHTML = ''; }, 4500);
  }

  async function saveChanges() {
    const btn = el('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const fresh = await apiFetch(`/portal/api/guilds/${state.currentGuildId}/config`, {
        method: 'PATCH',
        body: JSON.stringify(state.pendingPatch),
      });
      state.currentConfig = fresh;
      state.pendingPatch = {};
      renderApp();
      setStatus('Configuration saved.', 'success');
    } catch (error) {
      setStatus(error.message || 'Save failed', 'error');
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Save changes';
      }
    }
  }

  async function selectGuild(guildId, forceReload = false) {
    if (!forceReload && state.currentGuildId === guildId) {return;}
    state.currentGuildId = guildId;
    state.currentConfig = null;
    state.pendingPatch = {};
    renderApp(); // shows loading overlay
    try {
      state.currentConfig = await apiFetch(`/portal/api/guilds/${guildId}/config`);
      renderApp(); // replaces loading with config
    } catch (error) {
      setStatus(error.message || 'Failed to load guild config', 'error');
    }
  }

  function renderApp() {
    if (!state.user) {
      renderLogin();
      renderUserWidget();
      renderGuildModal();
      document.body.style.overflow = '';
      return;
    }

    el('app').innerHTML = renderGuildList();

    const sortSelect = el('sort-select');
    if (sortSelect) {
      sortSelect.addEventListener('change', (e) => {
        state.sortMode = e.target.value || 'member_count';
        renderApp();
      });
    }

    document.querySelectorAll('.guild-card').forEach((card) => {
      card.addEventListener('click', () => {
        const guildId = card.dataset.guildId;
        if (guildId) {
          openGuildModal(guildId);
        }
      });
    });

    const dashRoot = el('dashboard-modal-root');
    if (state.currentGuildId) {
      dashRoot.innerHTML = renderDashboardOverlay();
      wireDashboardEvents();
    } else {
      dashRoot.innerHTML = '';
    }

    renderUserWidget();
    renderGuildModal();
    // lock body scrolling if any modal is open
    document.body.style.overflow = (state.modalGuild || state.currentGuildId) ? 'hidden' : '';
  }

  async function bootstrap() {
    try {
      const userRes = await apiFetch('/portal/api/user');
      state.user = userRes.user;
    } catch (error) {
      state.user = null;
      renderApp();
      return;
    }
    renderApp();

    try {
      const me = await apiFetch('/portal/api/me');
      state.manageableGuilds = me.manageableGuilds || [];
      state.inviteableGuilds = me.inviteableGuilds || [];
      state.isBotOwner = Boolean(me.isBotOwner);
    } catch (error) {
      state.manageableGuilds = [];
      state.inviteableGuilds = [];
      state.isBotOwner = false;
    }
    state.guildsLoaded = true;
    renderApp();
  }

  bootstrap();
</script>
</body>
</html>
