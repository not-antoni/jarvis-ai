<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis — Portal</title>
  <meta name="description" content="Manage Jarvis for your Discord servers — features, moderators, automod, and more.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://cdn.discordapp.com" crossorigin>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text: #e9e9e9;
      --muted: #888;
      --accent: #5865f2;
      --danger: #ed4245;
      --success: #3ba55d;
      --warn: #faa61a;
    }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(88,101,242,0.12), transparent 60%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: #cfd4ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header.portal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .brand {
      display: flex; align-items: center; gap: 0.6rem;
      font-weight: 700; font-size: 1.1rem; color: #fff;
    }
    .brand svg { width: 24px; height: 24px; }
    .user-widget {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .user-widget img {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border-strong);
    }
    .user-name { font-weight: 500; }
    .user-handle { color: var(--muted); font-size: 0.85rem; }
    .logout-btn {
      margin-left: 0.75rem;
      padding: 0.35rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--danger); }

    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.75rem; margin: 0 0 0.25rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }

    .guild-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .guild-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      display: flex; gap: 0.9rem; align-items: center;
    }
    .guild-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
    }
    .guild-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88,101,242,0.3);
    }
    .guild-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--muted); flex-shrink: 0;
    }
    .guild-icon img { width: 100%; height: 100%; border-radius: inherit; object-fit: cover; }
    .guild-meta-text { min-width: 0; flex: 1; }
    .guild-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guild-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.15rem; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      background: var(--surface-2);
      border-radius: 999px;
      font-size: 0.7rem;
      margin-left: 0.35rem;
    }
    .badge.owner { background: rgba(250,166,26,0.2); color: var(--warn); }

    .dashboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-top: 1rem;
    }
    .dashboard h2 {
      font-size: 1.25rem;
      margin: 0 0 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .section { margin-bottom: 2.5rem; }
    .section h3 { font-size: 1rem; margin: 0 0 0.9rem; color: #fff; }
    .section p.hint { color: var(--muted); font-size: 0.85rem; margin: 0 0 0.9rem; }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .feature-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .feature-toggle label { text-transform: capitalize; cursor: pointer; }

    .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #333; border-radius: 24px; transition: 0.2s;
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    select, input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      margin: 0.15rem 0.3rem 0.15rem 0;
      font-size: 0.85rem;
    }
    .chip button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0;
    }
    .chip button:hover { color: var(--danger); }

    .btn {
      padding: 0.55rem 1.1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      color: var(--text);
    }

    .save-bar {
      position: sticky;
      bottom: 1rem;
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(10,10,10,0.95);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .save-bar.hidden { display: none; }

    .status-msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .status-msg.info { background: rgba(88,101,242,0.15); color: #cfd4ff; }
    .status-msg.success { background: rgba(59,165,93,0.15); color: #93e0ae; }
    .status-msg.error { background: rgba(237,66,69,0.15); color: #f4a3a5; }

    .loading { color: var(--muted); padding: 2rem; text-align: center; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      background: var(--surface);
    }
    .empty-state p { color: var(--muted); margin: 0.5rem 0; }

    .login-hero {
      max-width: 560px; margin: 4rem auto; text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
    }
    .login-hero h1 { font-size: 2.2rem; margin: 0 0 0.75rem; }
    .login-hero p { color: var(--muted); margin: 0 0 2rem; }
    .discord-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--accent);
      color: #fff;
      padding: 0.9rem 1.75rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
    }
    .discord-btn:hover { opacity: 0.9; text-decoration: none; }

    @media (max-width: 640px) {
      header.portal-header { padding: 1rem; }
      main { padding: 1.25rem; }
      .dashboard { padding: 1.25rem; }
      .user-name { display: none; }
    }
  </style>
</head>
<body>
<header class="portal-header">
  <a href="/" class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/>
    </svg>
    Jarvis Portal
  </a>
  <div id="user-widget" class="user-widget"></div>
</header>

<main>
  <div id="app">
    <div class="loading">Loading…</div>
  </div>
</main>

<script>
  const OAUTH_CONFIGURED = %%OAUTH_CONFIGURED%%;
  const BASE_URL = "%%SITE_BASE_URL%%";

  const state = {
    user: null,
    guilds: [],
    guildsLoaded: false,
    currentGuildId: null,
    currentConfig: null,
    pendingPatch: {},
  };

  const el = (id) => document.getElementById(id);

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (!res.ok) {
      let payload = {};
      try { payload = await res.json(); } catch {}
      throw new Error(payload.error || `Request failed: ${res.status}`);
    }
    return res.json();
  }

  function renderLogin() {
    const message = OAUTH_CONFIGURED
      ? "Sign in with Discord to manage Jarvis in servers where you're a moderator."
      : "Discord OAuth is not configured on this deployment. Contact the administrator.";
    el('app').innerHTML = `
      <div class="login-hero">
        <h1>Jarvis Portal</h1>
        <p>${escapeHtml(message)}</p>
        ${OAUTH_CONFIGURED ? `
          <a href="/portal/login" class="discord-btn">
            <svg width="22" height="17" viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.55 58.55 0 0 0 45.5.4a.22.22 0 0 0-.23.11c-.63 1.12-1.33 2.58-1.82 3.72a54 54 0 0 0-16.2 0A37.4 37.4 0 0 0 25.4.51.23.23 0 0 0 25.16.4 58.4 58.4 0 0 0 10.56 4.9a.2.2 0 0 0-.09.08C1.58 18.73-.92 32.14.3 45.38a.24.24 0 0 0 .09.17 58.84 58.84 0 0 0 17.72 8.97.23.23 0 0 0 .25-.08c1.37-1.87 2.59-3.84 3.63-5.92a.23.23 0 0 0-.12-.32 38.72 38.72 0 0 1-5.54-2.64.23.23 0 0 1-.02-.38c.37-.28.75-.57 1.1-.86a.22.22 0 0 1 .23-.03c11.62 5.3 24.2 5.3 35.69 0a.22.22 0 0 1 .23.03c.35.29.73.58 1.1.86a.23.23 0 0 1-.02.38 36.3 36.3 0 0 1-5.55 2.64.23.23 0 0 0-.12.32 44.44 44.44 0 0 0 3.63 5.92.23.23 0 0 0 .25.08 58.66 58.66 0 0 0 17.74-8.97.23.23 0 0 0 .09-.16c1.5-15.43-2.51-28.73-10.63-40.41a.18.18 0 0 0-.1-.08ZM23.72 37.33c-3.5 0-6.38-3.21-6.38-7.15 0-3.94 2.83-7.15 6.38-7.15 3.58 0 6.43 3.24 6.38 7.15 0 3.94-2.83 7.15-6.38 7.15Zm23.59 0c-3.5 0-6.38-3.21-6.38-7.15 0-3.94 2.83-7.15 6.38-7.15 3.58 0 6.43 3.24 6.38 7.15 0 3.94-2.8 7.15-6.38 7.15Z" fill="#fff"/></svg>
            Continue with Discord
          </a>
        ` : ''}
      </div>
    `;
  }

  function renderUserWidget() {
    if (!state.user) {
      el('user-widget').innerHTML = `<a href="/portal/login">Sign in</a>`;
      return;
    }
    const name = state.user.globalName || state.user.username;
    el('user-widget').innerHTML = `
      <img src="${escapeHtml(state.user.avatarUrl)}" alt="avatar" loading="lazy">
      <div>
        <div class="user-name">${escapeHtml(name)}</div>
        <div class="user-handle">@${escapeHtml(state.user.username)}</div>
      </div>
      <button class="logout-btn" id="logout-btn">Log out</button>
    `;
    el('logout-btn').addEventListener('click', async () => {
      await apiFetch('/portal/logout', { method: 'POST' }).catch(() => {});
      location.href = '/portal';
    });
  }

  function renderGuildList() {
    if (!state.guildsLoaded) {
      return `
        <h1>Your servers</h1>
        <p class="subtitle">Looking up servers where you can manage Jarvis…</p>
        <div class="loading">Loading servers…</div>
      `;
    }
    if (!state.guilds.length) {
      return `
        <div class="empty-state">
          <h2>No servers to manage</h2>
          <p>You need to be a server owner or moderator of a server where Jarvis is installed.</p>
          <p style="margin-top: 1rem;"><a href="%%DISCORD_INVITE%%">Join the support server</a> if you need help.</p>
        </div>
      `;
    }
    return `
      <h1>Your servers</h1>
      <p class="subtitle">Select a server to manage its Jarvis configuration.</p>
      <div class="guild-grid">
        ${state.guilds.map((g) => `
          <div class="guild-card ${state.currentGuildId === g.id ? 'active' : ''}" data-guild-id="${g.id}">
            <div class="guild-icon">${g.icon
              ? `<img src="${escapeHtml(g.icon)}" alt="" loading="lazy">`
              : escapeHtml((g.name || '?').charAt(0).toUpperCase())
            }</div>
            <div class="guild-meta-text">
              <div class="guild-name">${escapeHtml(g.name)}</div>
              <div class="guild-meta">
                ${Number(g.memberCount || 0).toLocaleString()} members
                ${g.youAreOwner ? '<span class="badge owner">Owner</span>' : ''}
                ${g.botHasAdmin ? '' : '<span class="badge">No Admin</span>'}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <div id="dashboard-container"></div>
    `;
  }

  function renderDashboard() {
    const cfg = state.currentConfig;
    if (!cfg) {return '';}
    const guild = state.guilds.find((g) => g.id === state.currentGuildId);
    const features = cfg.features || {};
    const channels = cfg.channels || [];
    const roles = cfg.roles || [];
    return `
      <div class="dashboard">
        <h2>
          <span>⚙️ ${escapeHtml(guild?.name || 'Server')} — Configuration</span>
          <button class="btn-secondary btn" id="reload-config-btn">↻ Reload</button>
        </h2>

        <div id="status-area"></div>

        <div class="section">
          <h3>Feature modules</h3>
          <p class="hint">Enable or disable Jarvis modules for this server. Changes apply immediately after saving.</p>
          <div class="feature-grid">
            ${Object.entries(features).map(([key, enabled]) => `
              <div class="feature-toggle">
                <label for="feat-${escapeHtml(key)}">${escapeHtml(key)}</label>
                <label class="switch">
                  <input type="checkbox" id="feat-${escapeHtml(key)}" data-feature="${escapeHtml(key)}" ${enabled ? 'checked' : ''}>
                  <span class="slider"></span>
                </label>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="section">
          <h3>AI chat channel</h3>
          <p class="hint">Restrict Jarvis chat replies to one channel. Leave empty to allow in any channel Jarvis can see.</p>
          <select id="ai-channel-select">
            <option value="">No restriction</option>
            ${channels.map((c) => `
              <option value="${escapeHtml(c.id)}" ${cfg.aiChannelId === c.id ? 'selected' : ''}>#${escapeHtml(c.name)}</option>
            `).join('')}
          </select>
        </div>

        <div class="section">
          <h3>Moderator roles</h3>
          <p class="hint">Members with these roles can run moderation commands and edit server config.</p>
          <select id="moderator-role-select">
            <option value="">Add a role…</option>
            ${roles.map((r) => `
              <option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>
            `).join('')}
          </select>
          <div id="moderator-role-chips" style="margin-top: 0.6rem;">
            ${(cfg.moderatorRoleIds || []).map((id) => {
              const role = roles.find((r) => r.id === id);
              return `<span class="chip" data-role-id="${escapeHtml(id)}">${escapeHtml(role?.name || id)} <button type="button">×</button></span>`;
            }).join('')}
          </div>
        </div>

        <div class="section">
          <h3>Wake word</h3>
          <p class="hint">Custom word that wakes Jarvis in voice chat, or disable wake words entirely.</p>
          <input type="text" id="wake-word-input" placeholder="jarvis" value="${escapeHtml(cfg.customWakeWord || '')}" maxlength="32">
          <div class="feature-toggle" style="margin-top: 0.75rem;">
            <label for="wake-disabled-toggle">Disable wake words entirely</label>
            <label class="switch">
              <input type="checkbox" id="wake-disabled-toggle" ${cfg.wakeWordsDisabled ? 'checked' : ''}>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="save-bar hidden" id="save-bar">
          <span id="save-bar-status">You have unsaved changes.</span>
          <div>
            <button class="btn-secondary btn" id="discard-btn">Discard</button>
            <button class="btn" id="save-btn">Save changes</button>
          </div>
        </div>
      </div>
    `;
  }

  function wireDashboardEvents() {
    // Feature toggles
    document.querySelectorAll('[data-feature]').forEach((el) => {
      el.addEventListener('change', () => {
        state.pendingPatch.features = state.pendingPatch.features || {};
        state.pendingPatch.features[el.dataset.feature] = el.checked;
        toggleSaveBar();
      });
    });

    // AI channel
    el('ai-channel-select')?.addEventListener('change', (e) => {
      state.pendingPatch.aiChannelId = e.target.value || null;
      toggleSaveBar();
    });

    // Moderator role add
    el('moderator-role-select')?.addEventListener('change', (e) => {
      const roleId = e.target.value;
      if (!roleId) {return;}
      const current = (state.pendingPatch.moderatorRoleIds || state.currentConfig.moderatorRoleIds || []).slice();
      if (current.includes(roleId)) {
        e.target.value = '';
        return;
      }
      current.push(roleId);
      state.pendingPatch.moderatorRoleIds = current;
      rerenderModeratorChips();
      e.target.value = '';
      toggleSaveBar();
    });

    // Moderator role remove
    el('moderator-role-chips')?.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') {return;}
      const chip = e.target.closest('.chip');
      if (!chip) {return;}
      const roleId = chip.dataset.roleId;
      const current = (state.pendingPatch.moderatorRoleIds || state.currentConfig.moderatorRoleIds || []).slice();
      state.pendingPatch.moderatorRoleIds = current.filter((id) => id !== roleId);
      rerenderModeratorChips();
      toggleSaveBar();
    });

    // Wake word
    el('wake-word-input')?.addEventListener('input', (e) => {
      state.pendingPatch.customWakeWord = e.target.value.trim() || null;
      toggleSaveBar();
    });
    el('wake-disabled-toggle')?.addEventListener('change', (e) => {
      state.pendingPatch.wakeWordsDisabled = e.target.checked;
      toggleSaveBar();
    });

    // Save / discard
    el('save-btn')?.addEventListener('click', saveChanges);
    el('discard-btn')?.addEventListener('click', () => {
      state.pendingPatch = {};
      renderApp();
    });
    el('reload-config-btn')?.addEventListener('click', () => selectGuild(state.currentGuildId, true));
  }

  function rerenderModeratorChips() {
    const container = el('moderator-role-chips');
    if (!container) {return;}
    const ids = state.pendingPatch.moderatorRoleIds || state.currentConfig.moderatorRoleIds || [];
    const roles = state.currentConfig.roles || [];
    container.innerHTML = ids.map((id) => {
      const role = roles.find((r) => r.id === id);
      return `<span class="chip" data-role-id="${escapeHtml(id)}">${escapeHtml(role?.name || id)} <button type="button">×</button></span>`;
    }).join('');
  }

  function toggleSaveBar() {
    const bar = el('save-bar');
    if (!bar) {return;}
    const hasPending = Object.keys(state.pendingPatch).length > 0;
    bar.classList.toggle('hidden', !hasPending);
  }

  function setStatus(message, kind = 'info') {
    const area = el('status-area');
    if (!area) {return;}
    area.innerHTML = `<div class="status-msg ${kind}">${escapeHtml(message)}</div>`;
    setTimeout(() => { if (area.innerHTML.includes(message)) area.innerHTML = ''; }, 4500);
  }

  async function saveChanges() {
    const btn = el('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const fresh = await apiFetch(`/portal/api/guilds/${state.currentGuildId}/config`, {
        method: 'PATCH',
        body: JSON.stringify(state.pendingPatch),
      });
      state.currentConfig = fresh;
      state.pendingPatch = {};
      renderApp();
      setStatus('Configuration saved.', 'success');
    } catch (error) {
      setStatus(error.message || 'Save failed', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save changes';
    }
  }

  async function selectGuild(guildId, forceReload = false) {
    if (!forceReload && state.currentGuildId === guildId) {return;}
    state.currentGuildId = guildId;
    state.currentConfig = null;
    state.pendingPatch = {};
    renderApp();
    try {
      state.currentConfig = await apiFetch(`/portal/api/guilds/${guildId}/config`);
      renderApp();
    } catch (error) {
      setStatus(error.message || 'Failed to load guild config', 'error');
    }
  }

  function renderApp() {
    if (!state.user) {
      renderLogin();
      renderUserWidget();
      return;
    }

    let html = renderGuildList();
    el('app').innerHTML = html;

    // Attach guild-card click handlers
    document.querySelectorAll('.guild-card').forEach((card) => {
      card.addEventListener('click', () => selectGuild(card.dataset.guildId));
    });

    if (state.currentGuildId) {
      const container = el('dashboard-container');
      if (state.currentConfig) {
        container.innerHTML = renderDashboard();
        wireDashboardEvents();
      } else {
        container.innerHTML = `<div class="loading">Loading server config…</div>`;
      }
    }

    renderUserWidget();
  }

  async function bootstrap() {
    // Step 1: get the user immediately from the lightweight endpoint so the
    // header, avatar and "Your servers" shell render straight away (#271).
    try {
      const userRes = await apiFetch('/portal/api/user');
      state.user = userRes.user;
    } catch (error) {
      state.user = null;
      renderApp();
      return;
    }
    renderApp();

    // Step 2: load guilds in the background. Manage-able guilds appear when
    // the API responds; never block the initial paint on it.
    try {
      const me = await apiFetch('/portal/api/me');
      state.guilds = me.manageableGuilds || [];
    } catch (error) {
      // Stay with the empty list rather than logging out.
      state.guilds = [];
    }
    state.guildsLoaded = true;
    renderApp();
  }

  bootstrap();
</script>
</body>
</html>
