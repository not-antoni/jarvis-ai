version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "@discordjs/*"
          - "discord.js"
      discord-js:
        patterns:
          - "@discordjs/*"
          - "discord.js"
        update-types:
          - minor
          - patch
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
          - "openai"
          - "@google/generative-ai"
        update-types:
          - minor
          - patch
    ignore:
      # puppeteer is pinned for the stealth plugin compatibility matrix
      - dependency-name: puppeteer
        update-types:
          - version-update:semver-major
      # sharp ships its own prebuilt binaries; major bumps risk libvips ABI drift
      - dependency-name: sharp
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
