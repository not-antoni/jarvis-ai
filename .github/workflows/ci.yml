name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install system deps (canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"
        run: npm ci

      # Throwaway env values - only exist to satisfy config/validate.js zod
      # schema so unit tests can `require('config')`. NONE of these are real
      # secrets and NOTHING in the test suite actually connects to Discord,
      # MongoDB, or any AI provider.
      - name: Run tests with coverage
        env:
          ALLOW_START_WITHOUT_DB: "true"
          DISCORD_TOKEN: "test.token.value"
          MASTER_KEY_BASE64: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          MONGO_URI_MAIN: "mongodb://localhost:27017/test"
          MONGO_URI_VAULT: "mongodb://localhost:27017/test"
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/tmp
          if-no-files-found: ignore
          retention-days: 14

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check
